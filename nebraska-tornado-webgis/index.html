<!DOCTYPE html>
<html>
<head>
  <title>Nebraska Tornado Paths Web GIS</title>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <link rel="stylesheet" href="https://unpkg.com/leaflet/dist/leaflet.css" />
  <script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>

  <style>
    body {
      margin: 0;
      font-family: Arial, sans-serif;
    }

    #map {
      height: 100vh;
      width: 100%;
    }

    .title-box {
      position: absolute;
      top: 10px;
      left: 50px;
      z-index: 1000;
      background: white;
      padding: 10px 14px;
      border-radius: 6px;
      box-shadow: 0 0 8px #777;
    }

    .title-box h2 {
      margin: 0;
      font-size: 18px;
    }

    .title-box p {
      margin: 4px 0 0 0;
      font-size: 13px;
    }
  </style>
</head>

<body>

<div id="map"></div>

<div class="title-box">
  <h2>Nebraska Tornado Paths</h2>
  <p>Historic tornado paths and touchdown points</p>
</div>

<script>
  // Create map
  const map = L.map('map').setView([41.5, -99.7], 7);

  const osm = L.tileLayer('https://tile.openstreetmap.org/{z}/{x}/{y}.png', {
  maxZoom: 19,
  attribution: '&copy; OpenStreetMap contributors'
   }).addTo(map);

  // Color tornado paths by EF/F rating
  function getColor(mag) {
    if (mag >= 5) return "#4b0082";
    if (mag >= 4) return "#800026";
    if (mag >= 3) return "#e31a1c";
    if (mag >= 2) return "#fd8d3c";
    if (mag >= 1) return "#feb24c";
    return "#ffffb2";
  }

  function tornadoStyle(feature) {
    const mag = Number(feature.properties.mag);

    return {
      color: getColor(mag),
      weight: mag >= 3 ? 4 : 2,
      opacity: 0.85
    };
  }

  function tornadoPopup(feature, layer) {
    const p = feature.properties;

    layer.bindPopup(`
      <b>Tornado Path</b><br>
      Year: ${p.yr}<br>
      Date: ${p.mo}/${p.dy}/${p.yr}<br>
      Rating: F/EF ${p.mag}<br>
      Length: ${p.len} miles<br>
      Width: ${p.wid} yards<br>
      Injuries: ${p.inj}<br>
      Deaths: ${p.fat}
    `);
  }

  // Tornado path layer
  const tornadoPaths = L.geoJSON(null, {
    style: tornadoStyle,
    onEachFeature: tornadoPopup
  });

  fetch("data/ne_tornadoes.geojson")
    .then(response => response.json())
    .then(data => {
      tornadoPaths.addData(data);
      tornadoPaths.addTo(map);
    });

  // Tornado touchdown points layer
  const tornadoPoints = L.geoJSON(null, {
    pointToLayer: function(feature, latlng) {
      return L.circleMarker(latlng, {
        radius: 4,
        color: "black",
        fillColor: "yellow",
        fillOpacity: 0.8,
        weight: 1
      });
    },
    onEachFeature: function(feature, layer) {
      const p = feature.properties;

      layer.bindPopup(`
        <b>Tornado Touchdown Point</b><br>
        Year: ${p.yr}<br>
        Date: ${p.mo}/${p.dy}/${p.yr}<br>
        Rating: F/EF ${p.mag}<br>
        Injuries: ${p.inj}<br>
        Deaths: ${p.fat}<br>
        <i>No ending coordinate was recorded.</i>
      `);
    }
  });

  fetch("data/ne_tornadoes_points.geojson")
    .then(response => response.json())
    .then(data => {
      tornadoPoints.addData(data);
    });

  // Layer control
  const baseMaps = {
    "OpenStreetMap": osm
  };

  const overlayMaps = {
    "Tornado Paths": tornadoPaths,
    "Touchdown Points": tornadoPoints
  };

  L.control.layers(baseMaps, overlayMaps).addTo(map);

</script>

</body>
</html>
