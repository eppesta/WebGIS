<!DOCTYPE html>
<html>
<head>
    <title>Lab 8 | Nebraska Tornado Map</title>
    <script src="https://d3js.org/d3.v5.min.js" charset="utf-8"></script>

    <script src="Data/us_counties.js"></script>
    <script src="Data/ne_tornadoes.js"></script>

    <style>
        body {
            position: absolute;
            font-family: "Proxima Nova", "Montserrat", sans-serif;
            margin: 0;
            padding: 0;
        }

        h1, h2 {
            position: absolute;
            left: 10px;
            background: white;
            padding: 4px 8px;
            font-weight: 100;
            z-index: 999;
        }

        h1 {
            top: 5px;
            font-size: 1.4em;
        }

        h2 {
            top: 45px;
            font-size: 1em;
        }

        svg {
            display: block;
        }

        .county {
            fill: #e5e5e5;
            stroke: #666;
            stroke-width: 0.7px;
        }

        .county-hover {
            fill: #cfcfcf;
        }

        .tornado {
            fill: #b30000;
            stroke: #ffffff;
            stroke-width: 0.8px;
            opacity: 0.8;
        }

        .tornado-hover {
            fill: yellow;
            opacity: 1;
        }
    </style>
</head>
<body>
    <h1>Nebraska Tornadoes</h1>
    <h2>Hover over a county or tornado</h2>

    <script>
        var width = 1000;
        var height = 700;

        var svg = d3.select("body")
            .append("svg")
            .attr("width", width)
            .attr("height", height);

        var countiesGroup = svg.append("g");
        var tornadoGroup = svg.append("g");

        var projection = d3.geoAlbers()
            .center([0, 41.5])
            .rotate([99.5, 0])
            .parallels([40, 43])
            .scale(5000)
            .translate([width / 2, height / 2]);

        var path = d3.geoPath()
            .projection(projection);

        countiesGroup.selectAll("path")
            .data(uscounties.features.filter(function(d) {
                return d.properties.STATE === "31";
            }))
            .enter()
            .append("path")
            .attr("class", "county")
            .attr("d", path)
            .on("mouseover", function(d) {
                d3.select(this).attr("class", "county county-hover");
                d3.select("h2").text("County: " + d.properties.NAME);
            })
            .on("mouseout", function() {
                d3.select(this).attr("class", "county");
                d3.select("h2").text("Hover over a county or tornado");
            });

        tornadoGroup.selectAll("circle")
            .data(netornadoes.features)
            .enter()
            .append("circle")
            .attr("class", "tornado")
            .attr("cx", function(d) {
                return projection(d.geometry.coordinates)[0];
            })
            .attr("cy", function(d) {
                return projection(d.geometry.coordinates)[1];
            })
            .attr("r", function(d) {
                var scaleText = d.properties.TOR_F_SCALE || "0";
                var mag = parseInt(scaleText.replace(/\D/g, "")) || 0;
                return 3 + mag * 1.5;
            })
            .on("mouseover", function(d) {
                d3.select(this).attr("class", "tornado tornado-hover");

                d3.select("h2").text(
                    "Date: " + (d.properties.BEGIN_DATE || "N/A") +
                    " | Location: " + (d.properties.BEGIN_LOCATION || "N/A") +
                    " | Scale: " + (d.properties.TOR_F_SCALE || "N/A") +
                    " | Injuries: " + (d.properties.INJURIES_DIRECT || 0) +
                    " | Deaths: " + (d.properties.DEATHS_DIRECT || 0)
                );
            })
            .on("mouseout", function() {
                d3.select(this).attr("class", "tornado");
                d3.select("h2").text("Hover over a county or tornado");
            });
    </script>
</body>
</html>
