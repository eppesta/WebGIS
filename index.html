<!DOCTYPE html>
<html>
<head>
  <title>Nebraska Tornado Paths Web GIS</title>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/leaflet@1.9.4/dist/leaflet.css">
<script src="https://cdn.jsdelivr.net/npm/leaflet@1.9.4/dist/leaflet.js"></script>

  <style>
    body {
      margin: 0;
      font-family: Arial, sandras-serif;
    }

    #map {
      height: 100vh;
      width: 100%;
    }

    .ui-panel {
  position: absolute;
  top: 10px;
  left: 50px;
  z-index: 1000;
  width: 300px;
}

.title-box,
.info-box,
.control-box {
  position: relative;
  margin-bottom: 10px;
  background: white;
  padding: 12px;
  border-radius: 6px;
  box-shadow: 0 0 8px #777;
}

.title-box h2 {
  margin: 0;
  font-size: 18px;
}

.title-box p {
  margin: 4px 0 0 0;
  font-size: 13px;
}

.info-box {
  font-size: 12px;
}

.control-box h3 {
  margin-top: 0;
}

.control-box select,
.control-box input,
.control-box button {
  width: 100%;
}

.control-box button {
  margin-top: 6px;
  padding: 5px;
}
 
  </style>
</head>

<body>

<div id="map"></div>

<div class="ui-panel">
  <div class="title-box">
    <h2>Nebraska Tornado Paths (1950–2024)</h2>
    <p>Spatial patterns of tornado intensity, movement, and incompe records</p>
  </div>

  <div class="info-box">
    <p>
      Use the filters to explore tornado intensity and year. Toggle layers on the right and search for cities.
    </p>
  </div>

  <div class="control-box">
    <h3>Filters</h3>

    <label>Minimum F/EF Rating</label>
    <select id="ratingFilter">
      <option value="-1">All</option>
      <option value="0">F/EF0+</option>
      <option value="1">F/EF1+</option>
      <option value="2">F/EF2+</option>
      <option value="3">F/EF3+</option>
      <option value="4">F/EF4+</option>
      <option value="5">F/EF5</option>
    </select>

    <br><br>

    <label>Decade</label>
<select id="decadeFilter">
  <option value="all">All Years</option>
  <option value="1950">1950s</option>
  <option value="1960">1960s</option>
  <option value="1970">1970s</option>
  <option value="1980">1980s</option>
  <option value="1990">1990s</option>
  <option value="2000">2000s</option>
  <option value="2010">2010s</option>
  <option value="2020">2020–2024</option>
</select>
    <br><br>
    <label>Search City</label>
    <input id="citySearch" type="text" placeholder="Example: Lincoln">
    <button id="searchButton" type="button">Search</button>
  </div>
</div>
<script>
const map = L.map('map').setView([41.5, -99.7], 7);

const basemap = L.tileLayer('https://server.arcgisonline.com/ArcGIS/rest/services/World_Topo_Map/MapServer/tile/{z}/{y}/{x}', {
  attribution: 'Tiles &copy; Esri'
}).addTo(map);

let tornadoData;
let tornadoPaths;
let tornadoPointsData;
let tornadoPoints;
let countyLayer;

const layerControl = L.control.layers(
  { "Esri Topographic": basemap },
  {}

</body>
</html>
